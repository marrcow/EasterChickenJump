<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>Easter Chicken Jump</title>
  <link rel="manifest" href="manifest.json">
  <!-- iOS PWA -->
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="ChickenJump">
  <link rel="apple-touch-icon" href="icon-192.png">
  <!-- Theme -->
  <meta name="theme-color" content="#FFD700">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #1a1a2e; display: flex; flex-direction: column; justify-content: center; align-items: center; height: 100vh; overflow: hidden; }
    #gameWrapper { position: relative; }
    canvas { display: block; border: 3px solid #444; border-radius: 8px; box-shadow: 0 0 40px rgba(0,0,0,0.6); max-width: 100vw; }
    #controls {
      display: none;
      position: absolute;
      bottom: 12px;
      left: 0; right: 0;
      justify-content: space-between;
      padding: 0 16px;
      pointer-events: none;
    }
    .ctrl-btn {
      pointer-events: all;
      width: 80px; height: 80px;
      border-radius: 50%;
      border: 3px solid rgba(255,255,255,0.4);
      background: rgba(0,0,0,0.35);
      color: #fff;
      font-size: 32px;
      display: flex; align-items: center; justify-content: center;
      user-select: none;
      -webkit-user-select: none;
      touch-action: none;
    }
    .ctrl-btn:active { background: rgba(255,255,255,0.25); }
  </style>
</head>
<body>
<div id="gameWrapper">
  <canvas id="gameCanvas"></canvas>
  <div id="controls">
    <button class="ctrl-btn" id="btnSquat">🐣</button>
    <button class="ctrl-btn" id="btnJump">🐇</button>
  </div>
</div>
<script>
// ─── Canvas setup ────────────────────────────────────────────────────────────
const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');
const W = 900, H = 400;
canvas.width = W; canvas.height = H;

// Scale canvas to fit screen while keeping aspect ratio
function fitCanvas() {
  const scale = Math.min(window.innerWidth / W, window.innerHeight / H, 1);
  canvas.style.width  = (W * scale) + 'px';
  canvas.style.height = (H * scale) + 'px';
}
fitCanvas();
window.addEventListener('resize', fitCanvas);

// Show touch controls on touch devices
const isTouchDevice = () => window.matchMedia('(pointer: coarse)').matches;
if (isTouchDevice()) document.getElementById('controls').style.display = 'flex';

// ─── Constants ───────────────────────────────────────────────────────────────
const GROUND_Y      = H * 0.80;   // y of the ground surface
const GRAVITY       = 0.55;
const JUMP_FORCE    = -13;
const CHICKEN_X     = 130;
const CHICKEN_W     = 52;
const CHICKEN_H     = 58;
const SQUAT_H       = 24;   // hitbox height when squatting

// ─── Game state ──────────────────────────────────────────────────────────────
let state = 'idle';   // 'idle' | 'playing' | 'dead'
let score, highScore, eggs, floaters;
let spawnInterval, diffInterval;
let currentSpeed, spawnDelay;
let chicken, keys;
let animId;
let deathAnim = null, confetti = [], isNewHigh = false;
let deadSince = 0;  // timestamp when game ended
const DEAD_DELAY = 2000; // ms before restart is allowed

function canRestart() { return state !== 'playing' && (state !== 'dead' || Date.now() - deadSince >= DEAD_DELAY); }

// ─── Audio ───────────────────────────────────────────────────────────────────
let audioCtx = null;

function getAudio() {
  if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  if (audioCtx.state === 'suspended') audioCtx.resume();
  return audioCtx;
}

// Single chirp: freq sweep from freq → freq*freqRatio over duration seconds
function chirp(freq, duration, delay = 0, vol = 0.13, freqRatio = 1.4, type = 'sine') {
  const ac = getAudio();
  const osc  = ac.createOscillator();
  const gain = ac.createGain();
  osc.connect(gain);
  gain.connect(ac.destination);
  osc.type = type;
  const t = ac.currentTime + delay;
  osc.frequency.setValueAtTime(freq, t);
  osc.frequency.exponentialRampToValueAtTime(freq * freqRatio, t + duration * 0.4);
  osc.frequency.exponentialRampToValueAtTime(freq * 0.85, t + duration);
  gain.gain.setValueAtTime(0, t);
  gain.gain.linearRampToValueAtTime(vol, t + 0.012);
  gain.gain.exponentialRampToValueAtTime(0.001, t + duration);
  osc.start(t);
  osc.stop(t + duration + 0.02);
}

function sndJump()         { chirp(680, 0.10, 0, 0.12, 1.5);
                             chirp(980, 0.07, 0.09, 0.09, 1.1); }

function sndCollect()      { chirp(900, 0.07, 0,    0.13, 1.2);
                             chirp(1150,0.07, 0.08, 0.13, 1.1); }

function sndPowerCollect() { chirp(650, 0.07, 0,    0.15, 1.3);
                             chirp(820, 0.07, 0.08, 0.15, 1.3);
                             chirp(1050,0.07, 0.16, 0.15, 1.3);
                             chirp(1400,0.13, 0.24, 0.18, 1.1); }

function sndDestroy()      {
  const ac = getAudio();
  const osc = ac.createOscillator(), gain = ac.createGain();
  osc.connect(gain); gain.connect(ac.destination);
  osc.type = 'sawtooth';
  const t = ac.currentTime;
  osc.frequency.setValueAtTime(420, t);
  osc.frequency.exponentialRampToValueAtTime(90, t + 0.14);
  gain.gain.setValueAtTime(0.18, t);
  gain.gain.exponentialRampToValueAtTime(0.001, t + 0.14);
  osc.start(t); osc.stop(t + 0.15);
}

function sndGameOver()     { chirp(580, 0.13, 0,    0.15, 0.7);
                             chirp(460, 0.13, 0.16, 0.15, 0.7);
                             chirp(300, 0.22, 0.32, 0.18, 0.6); }

function sndHighScore() {
  // Triumphant ascending fanfare
  const notes = [[523,0],[659,0.13],[784,0.26],[1047,0.39],[784,0.56],[1047,0.68],[1319,0.80]];
  notes.forEach(([f, d], i) => chirp(f, i >= 4 ? 0.30 : 0.15, d, 0.20, 1.02));
}

// ─── Background music ────────────────────────────────────────────────────────
// A minor melody — tense, driving, 8th-note grid
// A4=440 C5=523 D5=587 E5=659 F5=698 G5=784 A5=880 B5=988
const BG_MELODY = [
  440, 659, 523, 659,   440, 523, 784, 659,
  698, 659, 523, 659,   440, 494, 523, 587,
  659, 784, 880, 784,   659, 698, 659, 523,
  440, 523, 659, 784,   880, 784, 659, 440
];
// Bass note (A2/E2/D2) fired every 4 melody notes (= quarter note pulse)
const BG_BASS  = [110, 110, 82, 98,  110, 110, 82, 82];
// Per-8th-note volume accents: beat 1 loudest, beat 3 medium, off-beats soft
const BG_VOL   = [0.11, 0.05, 0.07, 0.05, 0.09, 0.05, 0.07, 0.05];

let bgPlaying = false, bgNoteIdx = 0;
let bgSchedulerTimer = null, bgNextNoteTime = 0;

function bgBPM() {
  const spd = (typeof currentSpeed !== 'undefined') ? currentSpeed : 4.5;
  return 160 + ((spd - 4.5) / (14 - 4.5)) * 140;  // 160 → 300 BPM
}
function bgBeatSec() { return 60 / bgBPM() / 2; }  // 8th-note duration

function bgPlayNote(t) {
  const ac  = getAudio();
  const idx = bgNoteIdx % BG_MELODY.length;
  const bs  = bgBeatSec();

  // ── Melody (sawtooth — aggressive, cuts through) ──
  const mOsc = ac.createOscillator(), mGain = ac.createGain();
  mOsc.connect(mGain); mGain.connect(ac.destination);
  mOsc.type = 'sawtooth';
  mOsc.frequency.value = BG_MELODY[idx] * 0.5;   // one octave down
  const vol = BG_VOL[idx % 8];
  mGain.gain.setValueAtTime(0, t);
  mGain.gain.linearRampToValueAtTime(vol, t + 0.008);
  mGain.gain.exponentialRampToValueAtTime(0.001, t + bs * 0.55);
  mOsc.start(t); mOsc.stop(t + bs * 0.6);

  // ── Bass thump every 4 notes (square, punchy) ──
  if (idx % 4 === 0) {
    const bOsc = ac.createOscillator(), bGain = ac.createGain();
    bOsc.connect(bGain); bGain.connect(ac.destination);
    bOsc.type = 'square';
    bOsc.frequency.value = BG_BASS[Math.floor(idx / 4) % BG_BASS.length];
    bGain.gain.setValueAtTime(0, t);
    bGain.gain.linearRampToValueAtTime(0.09, t + 0.010);
    bGain.gain.exponentialRampToValueAtTime(0.001, t + bs * 3.2);
    bOsc.start(t); bOsc.stop(t + bs * 3.3);
  }

  // ── Rhythm tick on beats 1 & 3 (triangle click) ──
  if (idx % 4 === 0) {
    const tOsc = ac.createOscillator(), tGain = ac.createGain();
    tOsc.connect(tGain); tGain.connect(ac.destination);
    tOsc.type = 'triangle';
    tOsc.frequency.value = idx % 8 === 0 ? 1400 : 1000;  // accent beat 1
    tGain.gain.setValueAtTime(idx % 8 === 0 ? 0.08 : 0.05, t);
    tGain.gain.exponentialRampToValueAtTime(0.001, t + 0.035);
    tOsc.start(t); tOsc.stop(t + 0.04);
  }
}

function bgSchedule() {
  if (!bgPlaying) return;
  const ac = getAudio();
  while (bgNextNoteTime < ac.currentTime + 0.12) {
    bgPlayNote(bgNextNoteTime);
    bgNextNoteTime += bgBeatSec();  // recalc each note → tempo changes take effect immediately
    bgNoteIdx++;
  }
}

function startBgMusic() {
  stopBgMusic();
  bgPlaying = true;
  bgNoteIdx = 0;
  bgNextNoteTime = getAudio().currentTime + 0.05;
  bgSchedulerTimer = setInterval(bgSchedule, 40);
}

function stopBgMusic() {
  bgPlaying = false;
  clearInterval(bgSchedulerTimer);
  bgSchedulerTimer = null;
}

// ─── Input ───────────────────────────────────────────────────────────────────
keys = {};
document.addEventListener('keydown', e => {
  getAudio(); // unblock AudioContext on first keypress
  keys[e.code] = true;
  if (e.code === 'ArrowUp' || e.code === 'ArrowDown') e.preventDefault();
  if ((e.code === 'Space') && canRestart()) startGame();
});
document.addEventListener('keyup', e => keys[e.code] = false);
canvas.addEventListener('click', () => { getAudio(); if (canRestart()) startGame(); });

// Touch controls
function bindBtn(id, code) {
  const btn = document.getElementById(id);
  btn.addEventListener('touchstart', e => { e.preventDefault(); getAudio(); keys[code] = true;  if (canRestart()) startGame(); }, { passive: false });
  btn.addEventListener('touchend',   e => { e.preventDefault(); keys[code] = false; }, { passive: false });
}
bindBtn('btnJump',  'ArrowUp');
bindBtn('btnSquat', 'ArrowDown');

// ─── Init / reset ────────────────────────────────────────────────────────────
function startGame() {
  score       = 0;
  eggs        = [];
  floaters    = [];
  deathAnim   = null;
  confetti    = [];
  isNewHigh   = false;
  currentSpeed = 4.5;
  spawnDelay   = 1800;

  chicken = {
    x: CHICKEN_X,
    y: GROUND_Y - CHICKEN_H,
    vy: 0,
    onGround: true,
    squatting: false,
    frame: 0,
    frameTimer: 0,
    immortalUntil: 0
  };

  clearInterval(spawnInterval);
  clearInterval(diffInterval);
  cancelAnimationFrame(animId);

  scheduleSpawner();

  // Increase difficulty every 10 s
  diffInterval = setInterval(() => {
    if (state !== 'playing') return;
    currentSpeed = Math.min(currentSpeed + 0.6, 14);
    spawnDelay   = Math.max(spawnDelay - 120, 400);
    scheduleSpawner();
  }, 10000);

  state = 'playing';
  startBgMusic();
  loop();
}

function scheduleSpawner() {
  clearInterval(spawnInterval);
  spawnInterval = setInterval(spawnEgg, spawnDelay);
}

// ─── Spawning ────────────────────────────────────────────────────────────────
// TALL_EGG_BOTTOM: how low the wall egg reaches — must be above squat hitbox top (GROUND_Y - SQUAT_H)
const TALL_EGG_BOTTOM = GROUND_Y - SQUAT_H - 4;  // ~GROUND_Y-28, leaves gap for squatting

function spawnEgg() {
  if (state !== 'playing') return;
  const r = Math.random();

  // ~20% chance of a "wall" scrambled egg that forces squatting (cannot jump over)
  if (r < 0.20) {
    eggs.push({ x: W + 40, y: 0, type: 'scrambled', tall: true,
                speed: currentSpeed + (Math.random() * 0.6 - 0.3) });
    return;
  }

  // Normal eggs — ground / high / whole
  const type = Math.random() < 0.35 ? 'whole' : 'scrambled';
  let y;
  const r2 = Math.random();
  if (r2 < 0.50)      y = GROUND_Y - 18;   // ground (jump to avoid scrambled)
  else if (r2 < 0.80) y = GROUND_Y - 102;  // high   (jump to collect whole)
  else                y = GROUND_Y - 44;   // mid    (squat to avoid scrambled)
  const power = type === 'whole' && Math.random() < 0.30;
  eggs.push({ x: W + 30, y, type, tall: false, power, speed: currentSpeed + (Math.random() * 1 - 0.5) });
}

// ─── Collision (AABB) ─────────────────────────────────────────────────────────
function rectsOverlap(ax, ay, aw, ah, bx, by, bw, bh) {
  return ax < bx + bw && ax + aw > bx && ay < by + bh && ay + ah > by;
}

// ─── Game loop ───────────────────────────────────────────────────────────────
function loop() {
  update();
  draw();
  if (state === 'playing') animId = requestAnimationFrame(loop);
}

function update() {
  // Chicken physics
  chicken.vy += GRAVITY;
  chicken.y  += chicken.vy;

  if (chicken.y >= GROUND_Y - CHICKEN_H) {
    chicken.y = GROUND_Y - CHICKEN_H;
    chicken.vy = 0;
    chicken.onGround = true;
  } else {
    chicken.onGround = false;
  }

  // Squat (only on ground)
  chicken.squatting = keys['ArrowDown'] && chicken.onGround;

  // Jump (blocked while squatting)
  if (keys['ArrowUp'] && chicken.onGround && !chicken.squatting) {
    chicken.vy = JUMP_FORCE;
    chicken.onGround = false;
    sndJump();
  }
  // Fast fall (in air only)
  if (keys['ArrowDown'] && !chicken.onGround && chicken.vy < 0) {
    chicken.vy *= 0.4;
  }

  // Leg animation frame
  if (chicken.onGround && !chicken.squatting) {
    chicken.frameTimer++;
    if (chicken.frameTimer > 10) { chicken.frame = 1 - chicken.frame; chicken.frameTimer = 0; }
  }

  // Collision hitbox — smaller when squatting
  const squatting = chicken.squatting;
  const cHitX = chicken.x + 6;
  const cHitW = CHICKEN_W - 12;
  const cHitY = squatting ? GROUND_Y - SQUAT_H + 2 : chicken.y + 6;
  const cHitH = squatting ? SQUAT_H - 4 : CHICKEN_H - 6;

  for (let i = eggs.length - 1; i >= 0; i--) {
    const e = eggs[i];
    e.x -= e.speed;

    const eW = e.tall ? 42 : (e.type === 'whole' ? 28 : 36);
    const eH = e.tall ? TALL_EGG_BOTTOM - 5 : (e.type === 'whole' ? 36 : 28);
    const eX = e.x - eW / 2;
    const eY = e.tall ? 5 : e.y - eH / 2;

    if (rectsOverlap(cHitX, cHitY, cHitW, cHitH, eX, eY, eW, eH)) {
      if (e.type === 'whole') {
        score += 10;
        if (e.power) {
          chicken.immortalUntil = Date.now() + 5000;
          floaters.push({ x: e.x, y: e.y, text: 'INVINCIBLE!', alpha: 1, vy: -2, big: true });
          sndPowerCollect();
        } else {
          floaters.push({ x: e.x, y: e.y, text: '+10', alpha: 1, vy: -1.8 });
          sndCollect();
        }
        eggs.splice(i, 1);
      } else {
        if (Date.now() < chicken.immortalUntil) {
          // Immortal — destroy the scrambled egg and score points
          score += 5;
          floaters.push({ x: e.x, y: e.y, text: '💥 +5', alpha: 1, vy: -2 });
          eggs.splice(i, 1);
          sndDestroy();
        } else {
          // Scrambled egg hit → game over
          clearInterval(spawnInterval);
          clearInterval(diffInterval);
          stopBgMusic();
          const hs = parseInt(localStorage.getItem('chickenHighScore') || '0');
          isNewHigh = score > 0 && score > hs;
          if (isNewHigh) localStorage.setItem('chickenHighScore', score);
          highScore = Math.max(score, hs);
          state = 'dead';
          deadSince = Date.now();
          if (isNewHigh) sndHighScore(); else sndGameOver();
          initDeathAnim(isNewHigh);
          deadLoop();
          return;
        }
      }
    }

    if (e.x < -60) eggs.splice(i, 1);
  }

  // Floating score texts
  for (let i = floaters.length - 1; i >= 0; i--) {
    floaters[i].y  += floaters[i].vy;
    floaters[i].alpha -= 0.025;
    if (floaters[i].alpha <= 0) floaters.splice(i, 1);
  }
}

// ─── Drawing helpers ─────────────────────────────────────────────────────────
function drawBackground() {
  // Sky gradient
  const sky = ctx.createLinearGradient(0, 0, 0, GROUND_Y);
  sky.addColorStop(0, '#87CEEB');
  sky.addColorStop(1, '#d0f0ff');
  ctx.fillStyle = sky;
  ctx.fillRect(0, 0, W, GROUND_Y);

  // Sun
  ctx.beginPath();
  ctx.arc(W - 80, 55, 38, 0, Math.PI * 2);
  ctx.fillStyle = '#FFE135';
  ctx.fill();

  // Clouds
  drawCloud(200, 60, 0.9);
  drawCloud(520, 40, 1.1);
  drawCloud(730, 80, 0.7);

  // Ground
  ctx.fillStyle = '#5a9e3a';
  ctx.fillRect(0, GROUND_Y, W, H - GROUND_Y);
  ctx.fillStyle = '#4a8a2a';
  ctx.fillRect(0, GROUND_Y, W, 6);

  // Ground texture lines
  ctx.strokeStyle = 'rgba(0,0,0,0.08)';
  ctx.lineWidth = 1;
  for (let i = 0; i < 10; i++) {
    ctx.beginPath();
    ctx.moveTo(i * 100 - ((Date.now() / 10 * (currentSpeed / 4)) % 100), GROUND_Y + 12);
    ctx.lineTo(i * 100 - ((Date.now() / 10 * (currentSpeed / 4)) % 100) + 50, GROUND_Y + 12);
    ctx.stroke();
  }
}

function drawCloud(x, y, scale) {
  ctx.save();
  ctx.translate(x, y);
  ctx.scale(scale, scale);
  ctx.fillStyle = 'rgba(255,255,255,0.85)';
  ctx.beginPath(); ctx.arc(0,   0, 20, 0, Math.PI*2); ctx.fill();
  ctx.beginPath(); ctx.arc(25,  -5, 28, 0, Math.PI*2); ctx.fill();
  ctx.beginPath(); ctx.arc(55,  0, 20, 0, Math.PI*2); ctx.fill();
  ctx.beginPath(); ctx.arc(15,  10, 18, 0, Math.PI*2); ctx.fill();
  ctx.beginPath(); ctx.arc(40,  10, 22, 0, Math.PI*2); ctx.fill();
  ctx.restore();
}

function drawChicken(ch) {
  const now = Date.now();
  const immortal = ch.immortalUntil > now;
  if (immortal) {
    const timeLeft = ch.immortalUntil - now;
    const blinkRate = timeLeft < 1500 ? 70 : 140;
    if (Math.floor(now / blinkRate) % 2 === 0) return; // blink by skipping draw
  }

  if (ch.squatting) { drawChickenSquat(ch, immortal); return; }

  const x = ch.x, y = ch.y;
  ctx.save();

  // Golden glow when immortal
  if (immortal) {
    const pulse = 0.5 + 0.5 * Math.sin(now / 100);
    ctx.beginPath();
    ctx.ellipse(x + CHICKEN_W / 2, y + CHICKEN_H / 2, CHICKEN_W / 2 + 12 + pulse * 6, CHICKEN_H / 2 + 10 + pulse * 4, 0, 0, Math.PI * 2);
    ctx.fillStyle = `rgba(255, 215, 0, ${0.25 + 0.2 * pulse})`;
    ctx.fill();
  }

  // Legs
  const legSpread = ch.frame === 0 ? 6 : -3;
  ctx.strokeStyle = '#e07b00';
  ctx.lineWidth = 3;
  ctx.lineCap = 'round';

  // Left leg
  ctx.beginPath();
  ctx.moveTo(x + 18, y + CHICKEN_H - 4);
  ctx.lineTo(x + 18 - legSpread, y + CHICKEN_H + 10);
  ctx.lineTo(x + 8  - legSpread, y + CHICKEN_H + 10);
  ctx.stroke();

  // Right leg
  ctx.beginPath();
  ctx.moveTo(x + 34, y + CHICKEN_H - 4);
  ctx.lineTo(x + 34 + legSpread, y + CHICKEN_H + 10);
  ctx.lineTo(x + 44 + legSpread, y + CHICKEN_H + 10);
  ctx.stroke();

  // Body
  ctx.beginPath();
  ctx.ellipse(x + CHICKEN_W / 2, y + CHICKEN_H * 0.58, CHICKEN_W / 2 - 2, CHICKEN_H * 0.38, 0, 0, Math.PI * 2);
  ctx.fillStyle = '#FFD700';
  ctx.fill();
  ctx.strokeStyle = '#c8a800';
  ctx.lineWidth = 1.5;
  ctx.stroke();

  // Wing
  ctx.beginPath();
  ctx.ellipse(x + CHICKEN_W / 2 + 4, y + CHICKEN_H * 0.6, CHICKEN_W / 2 - 10, CHICKEN_H * 0.22, -0.3, 0, Math.PI * 2);
  ctx.fillStyle = '#e8c000';
  ctx.fill();

  // Head
  const headCX = x + CHICKEN_W * 0.72, headCY = y + CHICKEN_H * 0.25;
  ctx.beginPath();
  ctx.arc(headCX, headCY, 16, 0, Math.PI * 2);
  ctx.fillStyle = '#FFD700';
  ctx.fill();
  ctx.strokeStyle = '#c8a800';
  ctx.lineWidth = 1.5;
  ctx.stroke();

  // Comb (3 bumps)
  ctx.fillStyle = '#e02020';
  for (let i = 0; i < 3; i++) {
    ctx.beginPath();
    ctx.arc(headCX - 6 + i * 7, headCY - 14, 5, Math.PI, Math.PI * 2);
    ctx.fill();
  }

  // Eye
  ctx.beginPath();
  ctx.arc(headCX + 6, headCY - 2, 3.5, 0, Math.PI * 2);
  ctx.fillStyle = '#111';
  ctx.fill();
  ctx.beginPath();
  ctx.arc(headCX + 7, headCY - 3, 1.2, 0, Math.PI * 2);
  ctx.fillStyle = '#fff';
  ctx.fill();

  // Beak
  ctx.beginPath();
  ctx.moveTo(headCX + 13, headCY + 1);
  ctx.lineTo(headCX + 22, headCY + 4);
  ctx.lineTo(headCX + 13, headCY + 7);
  ctx.closePath();
  ctx.fillStyle = '#e07b00';
  ctx.fill();

  // Wattle
  ctx.beginPath();
  ctx.ellipse(headCX + 11, headCY + 9, 4, 6, 0.3, 0, Math.PI * 2);
  ctx.fillStyle = '#e02020';
  ctx.fill();

  // Tail feathers
  ctx.beginPath();
  ctx.moveTo(x + 4, y + CHICKEN_H * 0.42);
  ctx.bezierCurveTo(x - 14, y + CHICKEN_H * 0.1, x - 6, y + CHICKEN_H * 0.62, x + 2, y + CHICKEN_H * 0.65);
  ctx.fillStyle = '#e8c000';
  ctx.fill();

  ctx.restore();
}

function drawChickenSquat(ch, immortal) {
  const x = ch.x;
  const ground = GROUND_Y;
  const bodyY  = ground - 14;
  const now = Date.now();

  ctx.save();

  if (immortal) {
    const pulse = 0.5 + 0.5 * Math.sin(now / 100);
    ctx.beginPath();
    ctx.ellipse(x + CHICKEN_W / 2, bodyY, CHICKEN_W / 2 + 18, 20 + pulse * 4, 0, 0, Math.PI * 2);
    ctx.fillStyle = `rgba(255, 215, 0, ${0.25 + 0.2 * pulse})`;
    ctx.fill();
  }

  // Bent legs (short stubs close to body)
  ctx.strokeStyle = '#e07b00';
  ctx.lineWidth = 3;
  ctx.lineCap = 'round';

  ctx.beginPath();
  ctx.moveTo(x + 16, bodyY + 8);
  ctx.lineTo(x + 10, ground + 2);
  ctx.lineTo(x + 2,  ground + 2);
  ctx.stroke();

  ctx.beginPath();
  ctx.moveTo(x + 38, bodyY + 8);
  ctx.lineTo(x + 44, ground + 2);
  ctx.lineTo(x + 54, ground + 2);
  ctx.stroke();

  // Flattened body (wide, low ellipse)
  ctx.beginPath();
  ctx.ellipse(x + CHICKEN_W / 2, bodyY, CHICKEN_W / 2 + 10, 11, 0, 0, Math.PI * 2);
  ctx.fillStyle = '#FFD700';
  ctx.fill();
  ctx.strokeStyle = '#c8a800';
  ctx.lineWidth = 1.5;
  ctx.stroke();

  // Wing (flat against body)
  ctx.beginPath();
  ctx.ellipse(x + CHICKEN_W / 2 + 4, bodyY + 2, CHICKEN_W / 2, 7, -0.15, 0, Math.PI * 2);
  ctx.fillStyle = '#e8c000';
  ctx.fill();

  // Tail feathers (low, fanned out behind)
  ctx.beginPath();
  ctx.moveTo(x + 3, bodyY - 3);
  ctx.bezierCurveTo(x - 16, bodyY - 10, x - 10, bodyY + 8, x + 1, bodyY + 9);
  ctx.fillStyle = '#e8c000';
  ctx.fill();

  // Head pulled forward and low (beside body, not above)
  const headCX = x + CHICKEN_W + 2, headCY = bodyY - 1;
  ctx.beginPath();
  ctx.arc(headCX, headCY, 13, 0, Math.PI * 2);
  ctx.fillStyle = '#FFD700';
  ctx.fill();
  ctx.strokeStyle = '#c8a800';
  ctx.lineWidth = 1.5;
  ctx.stroke();

  // Comb (flattened / sideways because head is low)
  ctx.fillStyle = '#e02020';
  for (let i = 0; i < 3; i++) {
    ctx.beginPath();
    ctx.arc(headCX - 3 + i * 5, headCY - 11, 4, Math.PI, Math.PI * 2);
    ctx.fill();
  }

  // Eye
  ctx.beginPath();
  ctx.arc(headCX + 5, headCY, 3, 0, Math.PI * 2);
  ctx.fillStyle = '#111';
  ctx.fill();
  ctx.beginPath();
  ctx.arc(headCX + 6, headCY - 1, 1, 0, Math.PI * 2);
  ctx.fillStyle = '#fff';
  ctx.fill();

  // Beak (pointing forward)
  ctx.beginPath();
  ctx.moveTo(headCX + 11, headCY - 1);
  ctx.lineTo(headCX + 20, headCY + 2);
  ctx.lineTo(headCX + 11, headCY + 5);
  ctx.closePath();
  ctx.fillStyle = '#e07b00';
  ctx.fill();

  // Wattle
  ctx.beginPath();
  ctx.ellipse(headCX + 9, headCY + 7, 3.5, 5, 0.3, 0, Math.PI * 2);
  ctx.fillStyle = '#e02020';
  ctx.fill();

  ctx.restore();
}

function drawWholeEgg(x, y, power) {
  const t = Date.now();
  ctx.save();
  ctx.translate(x, y);

  if (power) {
    // Pulsing golden glow
    const pulse = 0.5 + 0.5 * Math.sin(t / 120);
    ctx.save();
    ctx.globalAlpha = 0.35 + 0.35 * pulse;
    ctx.beginPath();
    ctx.ellipse(0, 0, 26 + pulse * 8, 30 + pulse * 8, 0, 0, Math.PI * 2);
    ctx.fillStyle = '#FFD700';
    ctx.fill();
    ctx.restore();

    // Sparkles around egg
    const sparkCount = 5;
    for (let i = 0; i < sparkCount; i++) {
      const angle = (t / 400) + (i / sparkCount) * Math.PI * 2;
      const dist  = 24 + 4 * Math.sin(t / 200 + i);
      const sx = Math.cos(angle) * dist, sy = Math.sin(angle) * dist * 0.7;
      ctx.beginPath();
      ctx.arc(sx, sy, 2.5, 0, Math.PI * 2);
      ctx.fillStyle = i % 2 === 0 ? '#FFD700' : '#fff';
      ctx.fill();
    }
  }

  // Shadow
  ctx.beginPath();
  ctx.ellipse(0, 22, 14, 5, 0, 0, Math.PI * 2);
  ctx.fillStyle = 'rgba(0,0,0,0.18)';
  ctx.fill();

  // Egg body — golden tint if power, blinking between gold and white
  const eggColor = power
    ? (Math.floor(t / 200) % 2 === 0 ? '#FFE97A' : '#fffde0')
    : '#fffff0';
  ctx.beginPath();
  ctx.moveTo(0, -20);
  ctx.bezierCurveTo(14, -20, 18, -5, 18, 6);
  ctx.bezierCurveTo(18, 18, 10, 22, 0, 22);
  ctx.bezierCurveTo(-10, 22, -18, 18, -18, 6);
  ctx.bezierCurveTo(-18, -5, -14, -20, 0, -20);
  ctx.closePath();
  ctx.fillStyle = eggColor;
  ctx.fill();
  ctx.strokeStyle = power ? '#c8a800' : '#ddd';
  ctx.lineWidth = 1.5;
  ctx.stroke();

  // Highlight
  ctx.beginPath();
  ctx.ellipse(-5, -8, 4, 7, -0.5, 0, Math.PI * 2);
  ctx.fillStyle = 'rgba(255,255,255,0.7)';
  ctx.fill();

  ctx.restore();
}

function drawScrambledEgg(x, y) {
  ctx.save();
  ctx.translate(x, y);

  // Shadow
  ctx.beginPath();
  ctx.ellipse(0, 18, 20, 6, 0, 0, Math.PI * 2);
  ctx.fillStyle = 'rgba(0,0,0,0.18)';
  ctx.fill();

  // Egg white blobs
  ctx.fillStyle = '#fffde0';
  ctx.beginPath();
  ctx.ellipse(-6, 4, 16, 10, -0.3, 0, Math.PI * 2);
  ctx.fill();
  ctx.beginPath();
  ctx.ellipse(8, 2, 13, 9, 0.4, 0, Math.PI * 2);
  ctx.fill();
  ctx.beginPath();
  ctx.ellipse(0, 10, 12, 8, 0.1, 0, Math.PI * 2);
  ctx.fill();

  // Yolk (messy, broken)
  ctx.beginPath();
  ctx.ellipse(2, 2, 9, 7, 0.3, 0, Math.PI * 2);
  ctx.fillStyle = '#f5a623';
  ctx.fill();
  ctx.beginPath();
  ctx.ellipse(-8, 6, 5, 4, -0.5, 0, Math.PI * 2);
  ctx.fillStyle = '#f5a623';
  ctx.fill();

  // Yolk drips
  ctx.strokeStyle = '#f5a623';
  ctx.lineWidth = 2.5;
  ctx.lineCap = 'round';
  ctx.beginPath();
  ctx.moveTo(8, 5);
  ctx.bezierCurveTo(12, 8, 14, 14, 10, 18);
  ctx.stroke();
  ctx.beginPath();
  ctx.moveTo(-4, 10);
  ctx.bezierCurveTo(-6, 13, -5, 17, -8, 20);
  ctx.stroke();

  ctx.restore();
}

function drawTallScrambledEgg(x) {
  const top    = 5;
  const bottom = TALL_EGG_BOTTOM;
  const halfW  = 21;

  ctx.save();
  ctx.translate(x, 0);

  // Egg-white base (tall band)
  ctx.fillStyle = '#fffde0';
  ctx.beginPath();
  ctx.roundRect(-halfW, top, halfW * 2, bottom - top, 8);
  ctx.fill();

  // Wavy edge on left side (incoming direction) for splat feel
  ctx.fillStyle = '#fff5b0';
  for (let yy = top + 10; yy < bottom - 10; yy += 28) {
    ctx.beginPath();
    ctx.ellipse(-halfW - 6, yy, 10, 9, 0.4, 0, Math.PI * 2);
    ctx.fill();
    ctx.beginPath();
    ctx.ellipse(halfW + 5, yy + 14, 8, 7, -0.3, 0, Math.PI * 2);
    ctx.fill();
  }

  // Yolk blobs scattered throughout
  const yolkPositions = [
    [0,   top + 25, 9, 7, 0.2],
    [-6,  top + 65, 8, 6, -0.3],
    [7,   top + 105, 10, 7, 0.4],
    [-4,  top + 145, 8, 6, -0.1],
    [5,   top + 185, 9, 7, 0.3],
    [-3,  top + 225, 8, 6, -0.2],
  ];
  ctx.fillStyle = '#f5a623';
  yolkPositions.forEach(([px, py, rx, ry, rot]) => {
    if (py < bottom - 10) {
      ctx.beginPath();
      ctx.ellipse(px, py, rx, ry, rot, 0, Math.PI * 2);
      ctx.fill();
    }
  });

  // Drips from bottom edge
  ctx.strokeStyle = '#f5a623';
  ctx.lineWidth = 3;
  ctx.lineCap = 'round';
  [[-8, bottom], [3, bottom - 4], [12, bottom - 2]].forEach(([dx, dy]) => {
    ctx.beginPath();
    ctx.moveTo(dx, dy);
    ctx.bezierCurveTo(dx - 2, dy + 8, dx + 3, dy + 14, dx, dy + 18);
    ctx.stroke();
  });

  // White drips too
  ctx.strokeStyle = 'rgba(255,253,200,0.8)';
  ctx.lineWidth = 2.5;
  [[-14, bottom - 2], [8, bottom - 6]].forEach(([dx, dy]) => {
    ctx.beginPath();
    ctx.moveTo(dx, dy);
    ctx.bezierCurveTo(dx + 2, dy + 7, dx - 2, dy + 12, dx + 1, dy + 16);
    ctx.stroke();
  });

  // Outline
  ctx.strokeStyle = '#d4b800';
  ctx.lineWidth = 1.5;
  ctx.beginPath();
  ctx.roundRect(-halfW, top, halfW * 2, bottom - top, 8);
  ctx.stroke();

  // Warning label
  ctx.fillStyle = 'rgba(220,50,50,0.85)';
  ctx.font = 'bold 11px monospace';
  ctx.textAlign = 'center';
  ctx.fillText('SQUAT!', 0, top + 14);

  ctx.restore();
}

// ─── Death animation ─────────────────────────────────────────────────────────
function initDeathAnim(isNewHigh) {
  const feathers = [];
  const cx = CHICKEN_X + CHICKEN_W / 2 + 10;
  const cy = GROUND_Y - CHICKEN_H * 0.55;
  for (let i = 0; i < 14; i++) {
    const a = (i / 14) * Math.PI * 2 + Math.random() * 0.5;
    feathers.push({
      x: cx, y: cy,
      vx: Math.cos(a) * (2.5 + Math.random() * 5),
      vy: Math.sin(a) * (2.5 + Math.random() * 5) - 3,
      rot: Math.random() * Math.PI * 2,
      rotV: (Math.random() - 0.5) * 0.35,
      alpha: 1,
      size: 5 + Math.random() * 9,
      color: Math.random() < 0.5 ? '#FFD700' : '#e8c000'
    });
  }
  deathAnim = {
    timer: 0, rotation: 0, rotSpeed: 0.22,
    y: GROUND_Y - CHICKEN_H, vy: -7,
    feathers
  };
  if (isNewHigh) initConfetti();
}

function updateDeathAnim() {
  if (!deathAnim) return;
  const da = deathAnim;
  da.timer++;

  // Spinning + bounce phase (first 75 frames ≈ 1.25s)
  if (da.timer < 75) {
    da.vy += 0.35;
    da.y  += da.vy;
    if (da.y >= GROUND_Y - CHICKEN_H) {
      da.y   = GROUND_Y - CHICKEN_H;
      da.vy  = da.timer < 55 ? da.vy * -0.45 : 0;
    }
    da.rotation += da.rotSpeed;
    da.rotSpeed  = Math.max(da.rotSpeed - 0.001, 0.04); // slow spin over time
  }

  // Feathers
  da.feathers.forEach(f => {
    f.x   += f.vx;
    f.y   += f.vy;
    f.vy  += 0.18;
    f.vx  *= 0.98;
    f.rot += f.rotV;
    f.alpha = Math.max(f.alpha - 0.010, 0);
  });

  updateConfetti();
}

function drawDeadChicken() {
  if (!deathAnim) return;
  const da  = deathAnim;
  const cx  = CHICKEN_X + CHICKEN_W / 2 + 10;

  // ── Feathers ──
  da.feathers.forEach(f => {
    if (f.alpha <= 0) return;
    ctx.save();
    ctx.globalAlpha = f.alpha;
    ctx.translate(f.x, f.y);
    ctx.rotate(f.rot);
    ctx.fillStyle = f.color;
    ctx.beginPath();
    ctx.ellipse(0, 0, f.size, f.size * 0.38, 0, 0, Math.PI * 2);
    ctx.fill();
    ctx.restore();
  });

  if (da.timer < 75) {
    // ── Spinning phase ──
    const spinCy = da.y + CHICKEN_H * 0.5;
    ctx.save();
    ctx.translate(cx, spinCy);
    ctx.rotate(da.rotation);

    // Body
    ctx.beginPath();
    ctx.ellipse(0, 4, CHICKEN_W / 2 - 2, CHICKEN_H * 0.37, 0, 0, Math.PI * 2);
    ctx.fillStyle = '#FFD700'; ctx.fill();
    ctx.strokeStyle = '#c8a800'; ctx.lineWidth = 1.5; ctx.stroke();

    // Wing
    ctx.beginPath();
    ctx.ellipse(4, 6, CHICKEN_W / 2 - 10, CHICKEN_H * 0.20, -0.3, 0, Math.PI * 2);
    ctx.fillStyle = '#e8c000'; ctx.fill();

    // Head
    ctx.beginPath(); ctx.arc(18, -14, 13, 0, Math.PI * 2);
    ctx.fillStyle = '#FFD700'; ctx.fill();
    ctx.strokeStyle = '#c8a800'; ctx.stroke();

    // X eyes
    _xEye(24, -17);

    // Comb
    ctx.fillStyle = '#e02020';
    [0,1,2].forEach(i => { ctx.beginPath(); ctx.arc(14+i*5, -25, 4, Math.PI, Math.PI*2); ctx.fill(); });

    // Beak
    ctx.beginPath();
    ctx.moveTo(28,-13); ctx.lineTo(37,-10); ctx.lineTo(28,-7);
    ctx.fillStyle = '#e07b00'; ctx.fill();

    // Tongue sticking out already
    ctx.strokeStyle = '#e02020'; ctx.lineWidth = 2.5; ctx.lineCap = 'round';
    ctx.beginPath(); ctx.moveTo(34,-9); ctx.bezierCurveTo(38,-6,35,0,39,2); ctx.stroke();

    ctx.restore();

  } else {
    // ── Settled: lying on back, legs in the air ──
    const groundY = GROUND_Y - 10;
    ctx.save();
    ctx.translate(cx, groundY);

    // Shadow
    ctx.beginPath(); ctx.ellipse(0, 4, 34, 7, 0, 0, Math.PI * 2);
    ctx.fillStyle = 'rgba(0,0,0,0.18)'; ctx.fill();

    // Body flat on back
    ctx.beginPath();
    ctx.ellipse(0, 0, CHICKEN_H * 0.37, CHICKEN_W / 2 - 3, 0, 0, Math.PI * 2);
    ctx.fillStyle = '#FFD700'; ctx.fill();
    ctx.strokeStyle = '#c8a800'; ctx.lineWidth = 1.5; ctx.stroke();

    // Wing
    ctx.beginPath();
    ctx.ellipse(2, 3, CHICKEN_H * 0.28, CHICKEN_W / 2 - 12, 0.1, 0, Math.PI * 2);
    ctx.fillStyle = '#e8c000'; ctx.fill();

    // Tail feathers (to the left)
    ctx.beginPath();
    ctx.moveTo(-22, -4); ctx.bezierCurveTo(-38, -14, -34, 8, -20, 8);
    ctx.fillStyle = '#e8c000'; ctx.fill();

    // Legs pointing up
    ctx.strokeStyle = '#e07b00'; ctx.lineWidth = 3; ctx.lineCap = 'round';
    ctx.beginPath(); ctx.moveTo(-8,-10); ctx.lineTo(-10,-28); ctx.lineTo(-20,-28); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(6,-10); ctx.lineTo(10,-28); ctx.lineTo(20,-28); ctx.stroke();

    // Head to the right, flopped sideways
    ctx.beginPath(); ctx.arc(28, 1, 13, 0, Math.PI * 2);
    ctx.fillStyle = '#FFD700'; ctx.fill();
    ctx.strokeStyle = '#c8a800'; ctx.stroke();

    // Comb flopped
    ctx.fillStyle = '#e02020';
    [0,1,2].forEach(i => { ctx.beginPath(); ctx.arc(24+i*4, -10, 4, Math.PI, Math.PI*2); ctx.fill(); });

    // X eyes
    _xEye(33, -2);

    // Beak
    ctx.beginPath(); ctx.moveTo(38,4); ctx.lineTo(47,7); ctx.lineTo(38,10);
    ctx.fillStyle = '#e07b00'; ctx.fill();

    // Tongue lolling out
    ctx.strokeStyle = '#e02020'; ctx.lineWidth = 2.5; ctx.lineCap = 'round';
    ctx.beginPath();
    ctx.moveTo(43, 8); ctx.bezierCurveTo(48, 10, 45, 17, 50, 19);
    ctx.stroke();

    // Stars orbiting head
    const orbitR = 22;
    for (let i = 0; i < 3; i++) {
      const angle = (da.timer * 0.055) + (i / 3) * Math.PI * 2;
      const sx = 28 + Math.cos(angle) * orbitR;
      const sy = 1  + Math.sin(angle) * orbitR * 0.55;
      _star(sx, sy, 6, 2.5, i === 0 ? '#FFD700' : '#fff');
    }

    // Speech bubble "BOCK?!"
    const bx = 20, by = -36;
    ctx.fillStyle = 'rgba(255,255,255,0.92)';
    ctx.beginPath(); ctx.roundRect(bx - 28, by - 16, 56, 22, 6); ctx.fill();
    ctx.strokeStyle = '#888'; ctx.lineWidth = 1; ctx.stroke();
    // bubble tail
    ctx.beginPath(); ctx.moveTo(bx+4, by+6); ctx.lineTo(bx+12, by+16); ctx.lineTo(bx-2, by+6); ctx.fill();
    ctx.fillStyle = '#333';
    ctx.font = 'bold 13px monospace'; ctx.textAlign = 'center';
    ctx.fillText('BOCK?!', bx, by);

    ctx.restore();
  }
}

function _xEye(x, y) {
  ctx.save();
  ctx.strokeStyle = '#111'; ctx.lineWidth = 2.2; ctx.lineCap = 'round';
  ctx.beginPath();
  ctx.moveTo(x-3.5,y-3.5); ctx.lineTo(x+3.5,y+3.5);
  ctx.moveTo(x+3.5,y-3.5); ctx.lineTo(x-3.5,y+3.5);
  ctx.stroke();
  ctx.restore();
}

function _star(cx, cy, r, ir, color) {
  ctx.fillStyle = color;
  ctx.beginPath();
  for (let i = 0; i < 5; i++) {
    const a1 = (i * 4 * Math.PI / 5) - Math.PI / 2;
    const a2 = ((i * 4 + 2) * Math.PI / 5) - Math.PI / 2;
    ctx[i === 0 ? 'moveTo' : 'lineTo'](cx + Math.cos(a1)*r, cy + Math.sin(a1)*r);
    ctx.lineTo(cx + Math.cos(a2)*ir, cy + Math.sin(a2)*ir);
  }
  ctx.closePath(); ctx.fill();
}

// ─── Confetti ─────────────────────────────────────────────────────────────────
const CONFETTI_COLORS = ['#FF6B6B','#FFD700','#4ECDC4','#45B7D1','#96CEB4','#FFEAA7','#DDA0DD','#ff9ff3','#a29bfe'];

function initConfetti() {
  confetti = [];
  for (let i = 0; i < 110; i++) {
    confetti.push({
      x: Math.random() * W,
      y: -20 - Math.random() * 250,
      vx: (Math.random() - 0.5) * 4,
      vy: 1.8 + Math.random() * 3,
      rot: Math.random() * Math.PI * 2,
      rotV: (Math.random() - 0.5) * 0.22,
      color: CONFETTI_COLORS[Math.floor(Math.random() * CONFETTI_COLORS.length)],
      w: 10 + Math.random() * 9,
      h: 5 + Math.random() * 5,
      circle: Math.random() < 0.25
    });
  }
}

function updateConfetti() {
  confetti.forEach(c => {
    c.x   += c.vx;
    c.y   += c.vy;
    c.rot += c.rotV;
    c.vx  += (Math.random() - 0.5) * 0.08;
    if (c.y > H + 20) { c.y = -20; c.x = Math.random() * W; }
  });
}

function drawConfetti() {
  if (confetti.length === 0) return;
  confetti.forEach(c => {
    ctx.save();
    ctx.translate(c.x, c.y);
    ctx.rotate(c.rot);
    ctx.fillStyle = c.color;
    if (c.circle) {
      ctx.beginPath(); ctx.arc(0, 0, c.w / 2, 0, Math.PI * 2); ctx.fill();
    } else {
      ctx.fillRect(-c.w / 2, -c.h / 2, c.w, c.h);
    }
    ctx.restore();
  });
}

function drawHUD() {
  // Score
  ctx.fillStyle = 'rgba(0,0,0,0.35)';
  ctx.fillRect(12, 12, 160, 40);
  ctx.fillStyle = '#fff';
  ctx.font = 'bold 22px monospace';
  ctx.textAlign = 'left';
  ctx.fillText(`Score: ${score}`, 22, 37);

  // High score
  const hs = parseInt(localStorage.getItem('chickenHighScore') || '0');
  ctx.fillStyle = 'rgba(0,0,0,0.35)';
  ctx.fillRect(W - 192, 12, 180, 40);
  ctx.fillStyle = '#FFD700';
  ctx.textAlign = 'right';
  ctx.fillText(`Best: ${Math.max(score, hs)}`, W - 22, 37);
}

function drawFloaters() {
  floaters.forEach(f => {
    ctx.save();
    ctx.globalAlpha = f.alpha;
    if (f.big) {
      ctx.font = 'bold 26px monospace';
      ctx.fillStyle = '#FFD700';
      ctx.strokeStyle = '#000';
      ctx.lineWidth = 3;
      ctx.textAlign = 'center';
      ctx.strokeText(f.text, f.x, f.y);
      ctx.fillText(f.text, f.x, f.y);
    } else {
      ctx.fillStyle = '#00e676';
      ctx.font = 'bold 20px monospace';
      ctx.textAlign = 'center';
      ctx.fillText(f.text, f.x, f.y);
    }
    ctx.restore();
  });
}

function drawIdleScreen() {
  ctx.fillStyle = 'rgba(0,0,0,0.45)';
  ctx.fillRect(0, 0, W, H);

  ctx.fillStyle = '#FFD700';
  ctx.font = 'bold 52px monospace';
  ctx.textAlign = 'center';
  ctx.fillText('CHICKEN EGG JUMP', W / 2, H / 2 - 60);

  ctx.fillStyle = '#fff';
  ctx.font = '20px monospace';
  ctx.fillText('Collect whole eggs  |  Avoid scrambled eggs!', W / 2, H / 2 - 10);
  ctx.fillText('UP = jump   DOWN (ground) = squat   DOWN (air) = fast fall', W / 2, H / 2 + 25);

  ctx.fillStyle = '#FFD700';
  ctx.font = 'bold 26px monospace';
  const blink = Math.floor(Date.now() / 500) % 2 === 0;
  if (blink) ctx.fillText('PRESS SPACE or CLICK to start', W / 2, H / 2 + 80);
}

function drawDeadScreen() {
  // isNewHigh is the global flag set exactly once at game-over time

  ctx.fillStyle = 'rgba(0,0,0,0.55)';
  ctx.fillRect(0, 0, W, H);

  ctx.fillStyle = '#ff4444';
  ctx.font = 'bold 54px monospace';
  ctx.textAlign = 'center';
  ctx.fillText('GAME OVER', W / 2, H / 2 - 60);

  ctx.fillStyle = '#fff';
  ctx.font = 'bold 28px monospace';
  ctx.fillText(`Score: ${score}`, W / 2, H / 2 - 10);

  if (isNewHigh) {
    const pulse = 0.7 + 0.3 * Math.sin(Date.now() / 180);
    ctx.save();
    ctx.globalAlpha = pulse;
    ctx.fillStyle = '#FFD700';
    ctx.font = 'bold 26px monospace';
    ctx.fillText('★ NEW HIGH SCORE! ★', W / 2, H / 2 + 30);
    ctx.restore();
  } else {
    ctx.fillStyle = '#FFD700';
    ctx.font = '22px monospace';
    ctx.fillText(`High Score: ${highScore}`, W / 2, H / 2 + 30);
  }

  ctx.fillStyle = '#aaa';
  ctx.font = '20px monospace';
  const blink = Math.floor(Date.now() / 500) % 2 === 0;
  if (blink) ctx.fillText('PRESS SPACE or CLICK to restart', W / 2, H / 2 + 80);
}

// ─── Main draw ───────────────────────────────────────────────────────────────
function draw() {
  ctx.clearRect(0, 0, W, H);
  drawBackground();

  if (state === 'idle') {
    // Draw static chicken on idle screen
    drawChicken({ x: CHICKEN_X, y: GROUND_Y - CHICKEN_H, frame: 0, frameTimer: 0, onGround: true });
    drawIdleScreen();
    return;
  }

  // Eggs
  eggs.forEach(e => {
    if (e.tall)             drawTallScrambledEgg(e.x);
    else if (e.type === 'whole') drawWholeEgg(e.x, e.y, e.power);
    else                    drawScrambledEgg(e.x, e.y);
  });

  if (state === 'dead') drawDeadChicken();
  else drawChicken(chicken);
  drawFloaters();
  drawHUD();

  if (state === 'dead') { drawDeadScreen(); drawConfetti(); }
}

// ─── Dead animation loop (keeps pulsing text alive) ──────────────────────────
function deadLoop() {
  if (state === 'dead') {
    updateDeathAnim();
    draw();
    requestAnimationFrame(deadLoop);
  }
}

// ─── Idle animation loop ─────────────────────────────────────────────────────
function idleLoop() {
  if (state === 'idle') {
    draw();
    requestAnimationFrame(idleLoop);
  }
}

// Start with idle screen
idleLoop();

// ─── Service worker registration ─────────────────────────────────────────────
if ('serviceWorker' in navigator) {
  window.addEventListener('load', () => {
    navigator.serviceWorker.register('/EasterChickenJump/sw.js')
      .catch(() => {}); // silently ignore if offline or localhost
  });
}
</script>
